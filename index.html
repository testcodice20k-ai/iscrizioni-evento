<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evento Partecipanti</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f7f7fb;
  color:#2b2b2b;
}

.container {
  max-width:500px;
  margin:auto;
  padding:20px;
}

.card {
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h1 {
  text-align:center;
}

.counter {
  text-align:center;
  font-size:1.5rem;
  margin:10px 0;
}

.bar {
  height:20px;
  background:#eee;
  border-radius:20px;
  overflow:hidden;
}

.bar-inner {
  height:100%;
  width:0%;
  background:#a8c7ff;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

button {
  width:100%;
  margin-top:15px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#a8c7ff;
  font-weight:bold;
}

.success {
  text-align:center;
  color:green;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<h1 id="eventName">Evento Partecipanti</h1>

<div class="counter" id="counter">0 / 50</div>

<div class="bar">
  <div class="bar-inner" id="bar"></div>
</div>

<input id="nome" placeholder="Nome">
<input id="cognome" placeholder="Cognome">

<button onclick="invia()">Iscriviti</button>

<div id="msg" class="success"></div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
